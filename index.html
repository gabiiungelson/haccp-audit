<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HACCP Audit</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f5f4f0;color:#1a1a18;font-size:14px}
.header{background:#1a1a18;color:#fff;padding:12px 16px;display:flex;align-items:center;gap:12px}
.logo{width:34px;height:34px;background:#fff;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:18px}
.htitle{font-size:15px;font-weight:600}
.hsub{font-size:11px;color:rgba(255,255,255,0.5);margin-top:1px}
.badge{margin-right:auto;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500;background:#e4f2ea;color:#1a6b3a}
.main{max-width:820px;margin:0 auto;padding:1rem}
.abar{background:#fff;border:1px solid #ddd;border-radius:10px;padding:10px 14px;display:flex;align-items:center;gap:10px;margin-bottom:1rem;flex-wrap:wrap}
.abar label{font-size:12px;color:#666}
.abar input{border:1px solid #ddd;border-radius:6px;padding:6px 10px;font-size:13px;background:#f5f4f0;width:160px}
.dlbl{margin-right:auto;font-size:12px;color:#888}
.slbl{font-size:11px;font-weight:600;color:#aaa;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.zones{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:8px;margin-bottom:1.2rem}
.zone{background:#fff;border:1px solid #ddd;border-radius:10px;padding:13px 12px;cursor:pointer;text-align:right;transition:all .15s;position:relative}
.zone:hover{border-color:#aaa;transform:translateY(-1px)}
.zone.active{border-color:#1a4fa0;border-width:2px;background:#e8eef8}
.zscore{position:absolute;top:8px;left:9px;font-size:11px;font-weight:600;padding:2px 7px;border-radius:20px}
.sg{background:#e4f2ea;color:#1a6b3a}
.sa{background:#faf0df;color:#7a4a0a}
.sr{background:#f5e4e4;color:#8b1a1a}
.zicon{font-size:21px;margin-bottom:5px}
.zname{font-size:13px;font-weight:500}
.zmeta{font-size:11px;color:#aaa;margin-top:2px}
.clwrap{display:none}
.clwrap.on{display:block}
.clhead{background:#fff;border:1px solid #ddd;border-radius:10px;padding:13px 15px;display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;gap:8px;flex-wrap:wrap}
.cltitle{font-size:15px;font-weight:600}
.clsub{font-size:12px;color:#666;margin-top:2px}
.brow{display:flex;gap:6px;flex-wrap:wrap}
.btn{background:#f0efe9;border:1px solid #ddd;border-radius:6px;padding:6px 13px;font-size:12px;cursor:pointer;font-weight:500}
.btn:hover{background:#ddd}
.btnsave{background:#1a4fa0;color:#fff;border:1px solid #1a4fa0;border-radius:6px;padding:6px 13px;font-size:12px;cursor:pointer;font-weight:500}
.btnsave:hover{background:#133a78}
.sbar{background:#fff;border:1px solid #ddd;border-radius:10px;padding:11px 15px;display:flex;align-items:center;gap:14px;margin-bottom:8px;flex-wrap:wrap}
.sc{text-align:center;min-width:42px}
.scv{font-size:21px;font-weight:600;font-family:monospace;line-height:1}
.scl{font-size:10px;color:#aaa;margin-top:2px}
.pass{color:#1a6b3a}.fail{color:#8b1a1a}.na{color:#555}
.pw{flex:1;min-width:80px}
.pb{background:#ddd;border-radius:4px;height:7px;overflow:hidden}
.pf{height:100%;border-radius:4px;background:#1a6b3a;transition:width .4s}
.pp{font-size:19px;font-weight:700;font-family:monospace}
.qs{display:flex;flex-direction:column;gap:6px;margin-bottom:1rem}
.q{background:#fff;border:1px solid #ddd;border-radius:10px;padding:11px 13px;display:flex;gap:10px;align-items:flex-start}
.q.ap{border-right:3px solid #1a6b3a}
.q.af{border-right:3px solid #8b1a1a;background:#fdf9f9}
.q.an{border-right:3px solid #ccc}
.qi{font-size:10px;color:#aaa;min-width:16px;padding-top:2px}
.qb2{flex:1}
.qt{font-size:13px;line-height:1.5}
.qbtns{display:flex;gap:5px;margin-top:7px;flex-wrap:wrap}
.qb{border:1px solid #ddd;border-radius:20px;padding:4px 11px;font-size:12px;cursor:pointer;background:#f5f4f0;color:#555}
.qb.sp{background:#e4f2ea;border-color:#1a6b3a;color:#1a6b3a;font-weight:500}
.qb.sf{background:#f5e4e4;border-color:#8b1a1a;color:#8b1a1a;font-weight:500}
.qb.sn{background:#ebebE4;border-color:#888;color:#444;font-weight:500}
.toast{position:fixed;bottom:1.2rem;left:50%;transform:translateX(-50%);background:#1a1a18;color:#fff;padding:9px 18px;border-radius:8px;font-size:13px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.tok{background:#1a6b3a}
.terr{background:#8b1a1a}
@media(max-width:560px){.zones{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="header">
  <div class="logo">🛡️</div>
  <div><div class="htitle">HACCP Audit</div><div class="hsub">ביקורת תברואה</div></div>
  <span class="badge" id="badge">⏳ מתחבר...</span>
</div>
<div class="main">
  <div class="abar">
    <label>שם הבודק:</label>
    <input id="auditor" type="text" placeholder="הכנס שם...">
    <div class="dlbl" id="dlbl"></div>
  </div>
  <div class="slbl">בחר אזור לביקורת</div>
  <div class="zones" id="zones">
    <div style="padding:1rem;color:#888;font-size:13px">טוען מחלקות...</div>
  </div>
  <div class="clwrap" id="clwrap">
    <div class="clhead">
      <div><div class="cltitle" id="cltitle"></div><div class="clsub" id="clsub"></div></div>
      <div class="brow">
        <button class="btn" onclick="refresh()">↺ שאלות חדשות</button>
        <button class="btnsave" onclick="saveToSheets()">💾 שמור לשיט</button>
      </div>
    </div>
    <div class="sbar">
      <div class="sc"><div class="scv pass" id="sp">0</div><div class="scl">תקין</div></div>
      <div class="sc"><div class="scv fail" id="sf">0</div><div class="scl">לא תקין</div></div>
      <div class="sc"><div class="scv na" id="sn">0</div><div class="scl">לא רלוונטי</div></div>
      <div class="pw"><div class="pb"><div class="pf" id="pf" style="width:0%"></div></div></div>
      <div class="sc"><div class="pp" id="pp">0%</div><div class="scl">ציון</div></div>
    </div>
    <div class="qs" id="qs"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

let zone=null, questions=[], answers={}, scores={};

document.getElementById('dlbl').textContent = new Date().toLocaleDateString('he-IL',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
const sn = localStorage.getItem('haccp_auditor');
if(sn) document.getElementById('auditor').value = sn;
document.getElementById('auditor').onchange = e => localStorage.setItem('haccp_auditor', e.target.value);

function renderZones() {
  const grid = document.getElementById('zones');
  grid.innerHTML = Object.entries(QUESTIONS).map(([id,d]) => {
    const sc = scores[id];
    let scHtml = '';
    if(sc !== undefined) {
      const cls = sc>=80?'sg':sc>=60?'sa':'sr';
      scHtml = '<span class="zscore '+cls+'">'+sc+'%</span>';
    }
    return '<div class="zone" id="zc-'+id+'" onclick="selectZone(\''+id+'\')">'
      +scHtml+'<div class="zicon">'+d.icon+'</div>'
      +'<div class="zname">'+d.name+'</div>'
      +'<div class="zmeta">50 שאלות | 10 יבחרו אקראית</div></div>';
  }).join('');
  document.getElementById('badge').textContent = '✓ מוכן לביקורת';
  document.getElementById('badge').style.background = '#e4f2ea';
  document.getElementById('badge').style.color = '#1a6b3a';
}

function selectZone(id) {
  zone = {id, name: QUESTIONS[id].name};
  answers = {};
  document.querySelectorAll('.zone').forEach(z => z.classList.remove('active'));
  document.getElementById('zc-'+id).classList.add('active');
  document.getElementById('cltitle').textContent = QUESTIONS[id].name + ' — ביקורת HACCP';
  document.getElementById('clsub').textContent = new Date().toLocaleDateString('he-IL') + ' | 10 שאלות אקראיות מתוך 50';
  document.getElementById('clwrap').classList.add('on');
  questions = shuffle(QUESTIONS[id].q.slice()).slice(0,10);
  renderQs();
  updateScore();
}

function refresh() { if(zone) selectZone(zone.id); }

function renderQs() {
  document.getElementById('qs').innerHTML = questions.map((q,i) => {
    const a = answers[i];
    return '<div class="q'+(a?' a'+a[0]:'')+'">'
      +'<div class="qi">'+(i+1)+'</div><div class="qb2">'
      +'<div class="qt">'+q+'</div><div class="qbtns">'
      +'<button class="qb'+(a==='pass'?' sp':'')+'" onclick="setA('+i+',\'pass\')">✓ תקין</button>'
      +'<button class="qb'+(a==='fail'?' sf':'')+'" onclick="setA('+i+',\'fail\')">✗ לא תקין</button>'
      +'<button class="qb'+(a==='na'?' sn':'')+'" onclick="setA('+i+',\'na\')">— לא רלוונטי</button>'
      +'</div></div></div>';
  }).join('');
}

function setA(i,v) { answers[i]=answers[i]===v?null:v; renderQs(); updateScore(); }

function updateScore() {
  const vals = Object.values(answers).filter(Boolean);
  const pass = vals.filter(v=>v==='pass').length;
  const fail = vals.filter(v=>v==='fail').length;
  const na = vals.filter(v=>v==='na').length;
  const app = pass+fail;
  const pct = app>0 ? Math.round((pass/app)*100) : 0;
  document.getElementById('sp').textContent = pass;
  document.getElementById('sf').textContent = fail;
  document.getElementById('sn').textContent = na;
  document.getElementById('pp').textContent = pct+'%';
  const fill = document.getElementById('pf');
  fill.style.width = pct+'%';
  fill.style.background = pct>=80?'#1a6b3a':pct>=60?'#BA7517':'#8b1a1a';
  if(zone && app>0) scores[zone.id] = pct;
}

async function saveToSheets() {
  if(!zone) return;
  const auditor = document.getElementById('auditor').value || 'לא צוין';
  const vals = Object.values(answers).filter(Boolean);
  const pass = vals.filter(v=>v==='pass').length;
  const app = pass + vals.filter(v=>v==='fail').length;
  const score = app>0 ? Math.round((pass/app)*100) : 0;
  const payload = {
    auditor, deptId: zone.id, deptName: zone.name, score,
    answers: questions.map((q,i) => ({
      question: q,
      answer: answers[i]==='pass'?'תקין':answers[i]==='fail'?'לא תקין':answers[i]==='na'?'לא רלוונטי':'לא נבדק'
    }))
  };
  toast('שומר...');
  try {
    const r = await fetch(SHEETS_URL, {
      method: 'POST',
      body: JSON.stringify(payload)
    });
    const txt = await r.text();
    if(txt.includes('ok') || r.ok) {
      toast('נשמר בהצלחה! ✓', 'tok');
      renderZones();
    } else {
      toast('שגיאה בשמירה', 'terr');
    }
  } catch(e) {
    toast('שגיאת חיבור: '+e.message, 'terr');
  }
}

function shuffle(arr) {
  for(let i=arr.length-1;i>0;i--) {
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

function toast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show '+type;
  clearTimeout(t._t);
  t._t = setTimeout(()=>t.classList.remove('show'), 3500);
}

renderZones();
</script>
